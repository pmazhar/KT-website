<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Koja Travels</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="legal-container">

        <a href="index.html" class="back-link">← Home</a>

        <h1>Contact Us</h1>

        <p>
            We'd love to hear from you. If you have questions, feedback,
            support requests, or partnership inquiries, please reach out.
        </p>

        <h2>Email</h2>

        <p>
            <a href="mailto:hello@kojatravels.com">
                hello@kojatravels.com
            </a>
        </p>

        <h2>Send a Message</h2>

        <form class="contact-form">

            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Your name">

            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Your email">

            <label for="message">Message</label>
            <textarea id="message" rows="6" placeholder="How can we help?"></textarea>

            <button type="submit">Send Message</button>

        </form>

        <p class="contact-note">
            For the fastest response, please email us directly at
            <a href="mailto:hello@kojatravels.com">hello@kojatravels.com</a>.
        </p>

    </main>

</body>
</html>
